<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LassDownloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 320px;
            background: #1e1e1e;
            color: #ddd;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 13px;
        }
        .header {
            background: linear-gradient(135deg, #0078D7, #005a9e);
            padding: 12px 15px;
            text-align: center;
        }
        .header h3 { color: white; margin: 0; font-size: 16px; }
        .header p { color: rgba(255,255,255,0.8); font-size: 10px; margin-top: 4px; }
        .status {
            padding: 10px 15px;
            background: #252526;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
        }
        .connected { color: #4caf50; }
        .disconnected { color: #f44336; }
        .section { padding: 10px 15px; border-bottom: 1px solid #333; }
        .section-title {
            font-weight: bold;
            margin-bottom: 8px;
            color: #0078D7;
            font-size: 12px;
        }
        .setting {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
        }
        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #0078D7;
        }
        .btn {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            background: #0078D7;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn:hover { background: #005a9e; }
        .btn-secondary { background: #3c3c3c; }
        .btn-secondary:hover { background: #4c4c4c; }
        .footer {
            text-align: center;
            padding: 10px;
            font-size: 10px;
            color: #666;
        }
        .footer a { color: #0078D7; text-decoration: none; }
        input[type="text"] {
            width: 100%;
            padding: 6px;
            background: #3c3c3c;
            border: 1px solid #555;
            color: white;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h3>⚡ LassDownloader</h3>
        <p>Professional Download Manager</p>
    </div>
    
    <div class="status">
        <span>🔌 Connection</span>
        <span id="connStatus" class="connected">🟢 Connected</span>
    </div>
    
    <div class="section">
        <div class="section-title">⚙️ Settings</div>
        <div class="setting">
            <label>🎯 Auto-capture downloads</label>
            <input type="checkbox" id="autoCapture">
        </div>
        <div class="setting">
            <label>🔔 Show notifications</label>
            <input type="checkbox" id="notifications" checked>
        </div>
        <div class="setting">
            <label>📊 Show progress in page</label>
            <input type="checkbox" id="showProgress" checked>
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">🚀 Actions</div>
        <button class="btn" id="openApp">📂 Open LassDownloader</button>
        <button class="btn btn-secondary" id="testConnection">🔌 Test Connection</button>
    </div>
    
    <div class="section">
        <div class="section-title">📥 Quick Add</div>
        <input type="text" id="quickUrl" placeholder="Paste URL here...">
        <button class="btn" id="addUrl" style="margin-top:8px;">Add URL</button>
    </div>
    
    <div class="footer">
        <a href="#" id="about">About</a> |
        <span>v1.0.0</span>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
